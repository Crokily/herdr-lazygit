# herdr-lazygit 捆绑的 lazygit 配置(基础层)
#
# 由 scripts/run-lazygit.sh 通过 LG_CONFIG_FILE 加载。
# 用户覆盖层位于 $HERDR_PLUGIN_CONFIG_DIR/lazygit-user.yml,
# 那里的同名配置会覆盖本文件 —— 请不要直接改这个文件。
#
# 说明:
# - 刻意保持克制,只添加 C / B 两个自定义命令,不做其他键位改动。
#   注意 C 覆盖了 files 面板默认的「用 git editor 提交」(Commit changes
#   using git editor);B 的 global 上下文会被面板级默认键位遮蔽(见下)。
# - 不设置 gui.nerdFontsVersion(不假设用户装了 Nerd Font)。

gui:
  mouseEvents: true
  showRandomTip: false

customCommands:
  # C — AI 生成 commit message(files 面板)
  # 通过 menuFromCommand 调用 ai-commit-msg.sh candidates,
  # 每行一个候选,选中后执行 git commit。
  # 脚本的错误提示行以 "(" 开头(如 "(没有 staged 改动 …)"),
  # 选中这类行时不会真正 commit,只把提示回显到 command log。
  - key: 'C'
    context: 'files'
    description: 'AI 生成 commit message'
    loadingText: '正在提交…'
    output: 'log'
    # 注意:lazygit 不会把命令交给 shell 展开,所以这里显式用 sh -c
    # 包一层,让 $HERDR_LAZYGIT_ROOT 得以展开;选中值通过位置参数 $1
    # 传入,避免引号转义问题。
    prompts:
      - type: 'menuFromCommand'
        title: 'AI commit message 候选(生成中,可能需要几秒…)'
        key: 'Msg'
        command: "sh -c 'bash \"$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh\" candidates'"
    command: >-
      sh -c 'case "$1" in "("*) printf "%s\n" "$1" ;; *) git commit -m "$1" ;; esac' sh {{.Form.Msg | quote}}

  # B — 切换 AI 后端(全局)
  # 列出 ai-commit-msg.sh backends 的输出(名字<TAB>状态),
  # 选中后写入 $HERDR_PLUGIN_CONFIG_DIR/ai-backend.conf。
  # 局限:lazygit 里面板级默认键位优先于 context: 'global' 的自定义命令,
  # 所以在 commits 面板按 B 触发的是默认的「标记 rebase base commit」
  # (有副作用),不会弹本菜单;请在 files 等无冲突面板使用。
  - key: 'B'
    context: 'global'
    description: '切换 AI commit 后端'
    loadingText: '正在切换 AI 后端…'
    output: 'popup'
    outputTitle: 'AI 后端'
    prompts:
      - type: 'menuFromCommand'
        title: '选择 AI 后端'
        key: 'Backend'
        command: "sh -c 'bash \"$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh\" backends'"
        filter: '^(?P<name>[^\t]+)\t(?P<status>.*)$'
        valueFormat: '{{ .name }}'
        labelFormat: '{{ .name }} — {{ .status }}'
    command: >-
      sh -c 'bash "$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh" set-backend "$1"' sh {{.Form.Backend | quote}}

  # V — 在独立的 herdr pane 中查看选中文件的 diff(files 面板)
  # 用 herdr 的窗口系统替代 lazygit 内置的 diff 列:面板可保持纯侧栏布局
  # (sidePanelWidth: 0.99),diff 在需要时弹出为一个宽 pane(delta 渲染),
  # 按 q 退出 pager 时 pane 自动关闭。同一时刻只保留一个 diff pane。
  - key: 'V'
    context: 'files'
    description: '在 herdr pane 中查看 diff'
    command: >-
      sh -c 'bash "$HERDR_LAZYGIT_ROOT/scripts/show-diff-pane.sh" file "$1"' sh {{.SelectedPath | quote}}

  # m — 选择当前 AI 后端的模型(files 面板;覆盖 files 无默认键位)
  # 菜单列出候选(opencode 动态取列表,claude 给 haiku/sonnet/opus 常用档,
  # codex/gemini 无列表命令只显示当前值),选中后进入可编辑输入框,
  # 改或直接回车确认;留空 = 跟随该 CLI 自己的默认模型。
  - key: 'm'
    context: 'files'
    description: '选择 AI commit 模型'
    output: 'popup'
    outputTitle: 'AI 模型'
    prompts:
      - type: 'menuFromCommand'
        title: '选择模型(下一步还可手动修改)'
        key: 'Pick'
        command: "sh -c 'bash \"$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh\" models'"
        filter: '^(?P<id>.+)$'
        valueFormat: '{{ .id }}'
        labelFormat: '{{ .id }}'
      - type: 'input'
        title: '模型 id(可编辑;留空 = 跟随 CLI 默认)'
        key: 'Model'
        initialValue: '{{.Form.Pick}}'
    command: >-
      sh -c 'bash "$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh" set-model "$1"' sh {{.Form.Model | quote}}

  # E — 用 $EDITOR 编辑 AI prompt(保存后下一次 C 立即生效;
  # 删除该文件则恢复内置默认 prompt)
  - key: 'E'
    context: 'files'
    description: '编辑 AI commit prompt'
    output: 'terminal'
    command: >-
      sh -c '"${EDITOR:-vim}" "$(bash "$HERDR_LAZYGIT_ROOT/scripts/ai-commit-msg.sh" prompt-file)"'

  # v(小写)— 同 V,避免大小写踩空。代价:覆盖 files 面板默认的
  # range select(范围选择),但 Shift+↑/↓ 仍可完成同样操作。
  - key: 'v'
    context: 'files'
    description: '在 herdr pane 中查看 diff(同 V)'
    command: >-
      sh -c 'bash "$HERDR_LAZYGIT_ROOT/scripts/show-diff-pane.sh" file "$1"' sh {{.SelectedPath | quote}}
