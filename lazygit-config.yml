# Bundled lazygit configuration for herdr-lazygit (the first of three layers).
#
# Loaded through LG_CONFIG_FILE by scripts/run-lazygit.sh in this order:
#   lazygit-config.yml (this bundled file)
#     → $HERDR_PLUGIN_CONFIG_DIR/generated.yml (machine-generated plugin keys
#        and customCommands, produced from keys.conf by gen-config-layer.sh)
#     → $HERDR_PLUGIN_CONFIG_DIR/lazygit-user.yml (user-authored, always last
#        and therefore always wins)
#
# This file deliberately contains only the gui section:
# - All plugin customCommands (AI commit / expand / settings) live in the
#   generated layer. Change their keys through Settings (press the Settings key
#   in lazygit) or keys.conf; use lazygit-user.yml to override other settings.
# - No built-in keybindings are changed: v/V belong to lazygit (v = range select,
#   V = paste cherry-picked commits). Remap built-ins in the keybinding section
#   of lazygit-user.yml.
# - gui.nerdFontsVersion is unset (do not assume the user has a Nerd Font).

gui:
  mouseEvents: true
  showRandomTip: false
